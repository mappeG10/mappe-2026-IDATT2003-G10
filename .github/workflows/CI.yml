name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build, test, generate reports
      run: mvn clean verify javadoc:javadoc --batch-mode


    #- name: Run CheckStyle
    #  run: mvn checkstyle:check



    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: |
          target/site/jacoco/
          target/reports/apidocs/

  deploy-docs:
    needs: build-and-verify
    
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
